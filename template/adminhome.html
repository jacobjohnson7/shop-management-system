{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 22px;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .card-box {
            width: 260px;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
            cursor: pointer;
        }

        .card-box:hover {
            transform: translateY(-10px) scale(1.05);
        }

        .add-product {
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }

        .view-product {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- ✅ Navbar with Logout -->
<nav class="navbar navbar-expand-lg">
    <div class="container d-flex justify-content-between align-items-center">

        <span class="navbar-brand">Admin Dashboard</span>

        <!-- Logout Button -->
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>
</nav>

<!-- Main -->
<div class="main-container">

    <h1>Welcome Admin</h1>

    <div class="card-container">

        <!-- Add Product -->
        <a href="{% url 'addproduct' %}">
            <div class="card-box add-product">
                <div class="icon"><i class="bi bi-plus-circle-fill"></i></div>
                <h4>Add Product</h4>
                <p>Insert new product details</p>
            </div>
        </a>

        <!-- View Product -->
        <a href="{% url 'viewproduct' %}">
            <div class="card-box view-product">
                <div class="icon"><i class="bi bi-eye-fill"></i></div>
                <h4>View Product</h4>
                <p>See all available products</p>
            </div>
        </a>

    </div>

</div>

</body>
</html>
