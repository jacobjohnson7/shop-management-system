{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 22px;
        }

        /* Main Content */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            color: white;
            margin-bottom: 40px;
            font-weight: 600;
            text-align: center;
        }

        .card-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card-box {
            width: 260px;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: 0.3s;
            cursor: pointer;
        }

        .card-box:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Card Colors */
        .doctor {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
        }

        .patient {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
        }

        .management {
            background: linear-gradient(135deg, #43cea2, #185a9d);
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }

        a {
            text-decoration: none;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: white;
            padding: 12px;
            font-size: 14px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand">Shop Dashboard</span>
    </div>
</nav>

<div class="main-container">

    <h1>Shop Management</h1>

    <div class="card-container">

        <!-- Customer -->
        <a href="{% url 'custregister' %}">
            <div class="card-box doctor">
                <div class="icon"><i class="bi bi-person-badge-fill"></i></div>
                <h4>Customer</h4>
                <p>Customer Login</p>
            </div>
        </a>

        <!-- Admin -->
        <a href="{% url 'adminlogin' %}">
            <div class="card-box patient">
                <div class="icon"><i class="bi bi-person-plus-fill"></i></div>
                <h4>Admin</h4>
                <p>Admin Login</p>
            </div>
        </a>

    </div>

</div>

<!-- Footer -->
<div class="footer">
    © 2026 Shop Management System
</div>

</body>
</html>
