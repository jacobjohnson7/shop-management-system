<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container-box {
            width: 90%;
            margin: 40px auto;
        }

        /* Navbar */
        .navbar-custom {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .welcome-text {
            font-weight: 600;
            font-size: 18px;
        }

        .btn-cart {
            background: #ffc107;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-cart:hover {
            background: #e0a800;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
            border-radius: 8px;
        }

        /* Product Cards */
        .card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card img {
            height: 200px;
            object-fit: cover;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .price {
            color: #28a745;
            font-size: 18px;
            font-weight: bold;
        }

        .btn-add {
            background: #28a745;
            color: white;
            border-radius: 8px;
        }

        .btn-add:hover {
            background: #218838;
        }

        .section-title {
            color: white;
            font-weight: bold;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

<div class="container-box">

    <!-- Navbar -->
    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <div class="welcome-text">
            👋 Welcome, {{name.firstname}}
        </div>

        <div>
            <a href="{% url 'cart' %}" class="btn btn-cart me-2">🛒 Cart</a>
            <a href="{% url 'logout' %}" class="btn btn-logout">Logout</a>
        </div>
    </div>

    <!-- Products -->
    <h3 class="text-center section-title">🛍️ Explore Products</h3>

    <div class="row">

        {% for i in key %}
        <div class="col-md-4 mb-4">

            <div class="card shadow">
                <img src="{{ i.image.url }}" class="card-img-top">

                <div class="card-body text-center">
                    <h5 class="fw-bold">{{ i.product_name }}</h5>

                    <p class="price">₹ {{ i.price }}</p>

                    <!-- Form -->
                    <form method="POST" action="{% url 'addtocart' i.id %}">
                        {% csrf_token %}

                        <input type="number" name="quantity" value="1" min="1"
                               class="form-control mb-2">

                        <button type="submit" class="btn btn-add w-100">
                            🛒 Add to Cart
                        </button>
                    </form>
                </div>
            </div>

        </div>
        {% empty %}
        <h4 class="text-center text-white">No products available</h4>
        {% endfor %}

    </div>

</div>

</body>
</html>
