{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add / Update Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .btn-custom {
            width: 100%;
            border-radius: 10px;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .preview-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<!-- Back Button -->
<a href="{% url 'viewproduct' %}" class="btn btn-light back-btn">⬅ Back</a>

<div class="form-box">

    <h2>
        {% if i %} Update Product {% else %} Add Product {% endif %}
    </h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Product Name -->
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" name="product_name" class="form-control"
                   value="{{ i.product_name|default:'' }}" required>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" name="price" class="form-control"
                   value="{{ i.price|default:'' }}" required>
        </div>

        <!-- Stock -->
        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control"
                   value="{{ i.stock|default:'' }}" required>
        </div>

        <!-- Show Current Image (only in update) -->
        {% if i %}
        <div class="mb-3 text-center">
            <label class="form-label">Current Image</label><br>
            <img src="{{ i.image.url }}" class="preview-img">
        </div>
        {% endif %}

        <!-- Upload Image -->
        <div class="mb-3">
            <label class="form-label">
                {% if i %} Change Image {% else %} Product Image {% endif %}
            </label>
            <input type="file" name="image" class="form-control" {% if not i %}required{% endif %}>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary btn-custom">
            {% if i %} Update Product {% else %} Add Product {% endif %}
        </button>

    </form>

</div>

</body>
</html>
