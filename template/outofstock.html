<!DOCTYPE html>
<html>
<head>
    <title>Out of Stock</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #dc3545, #b02a37);
            font-family: 'Segoe UI', sans-serif;
        }

        .error-box {
            width: 400px;
            margin: 120px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 60px;
            color: #dc3545;
        }

        .btn-home {
            background: #007bff;
            color: white;
        }

        .btn-home:hover {
            background: #0056b3;
        }

        .btn-cart {
            background: #ffc107;
        }

        .btn-cart:hover {
            background: #e0a800;
        }
    </style>
</head>

<body>

<div class="error-box">

    <div class="icon">❌</div>

    <h2 class="mt-3 text-danger">Out of Stock!</h2>

    <p class="text-muted">
        Sorry, this product is currently unavailable or exceeds available stock.
    </p>

    <hr>

    <!-- Buttons -->
    <div class="d-grid gap-2">

        <a href="{% url 'userwelcome' %}" class="btn btn-home">
            🏠 Continue Shopping
        </a>

        <a href="{% url 'cart' %}" class="btn btn-cart">
            🛒 View Cart
        </a>

    </div>

</div>

</body>
</html>
